# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-ar0234-camera"
BBFILE_PATTERN_meta-ar0234-camera = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-ar0234-camera = "6"

LAYERDEPENDS_meta-ar0234-camera = "tegra core"
LAYERSERIES_COMPAT_meta-ar0234-camera = "wrynose"
