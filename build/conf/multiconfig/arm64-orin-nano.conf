MACHINE = "jetson-orin-nano-devkit-nvme"
TNSPEC_BOOTDEV:jetson-orin-nano-devkit = "nvme0n1p1"

MACHINE_EXTRA_RRECOMMENDS:append:jetson-orin-nano-devkit = " packagegroup-sel-support-orin-nano"

IMAGE_CLASSES += "image_types_tegra"

TEGRAFLASH_NO_INTERNAL_STORAGE = "1"

# https://github.com/orgs/OE4T/discussions/1286#discussioncomment-6456270
PARTITION_LAYOUT_TEMPLATE = "flash_t234_qspi.xml"
PARTITION_LAYOUT_EXTERNAL = "flash_l4t_external.xml"


MACHINEOVERRIDES =. "orin-nano:cuda:tegra:"

# inserted by meta-tegra orin-nano (keep kernel-module-r8168 from there)
# kernel-module-rtl88x2ce provided by nv-kernel-module-rtl8822ce-
MACHINE_EXTRA_RRECOMMENDS:remove:jetson-orin-nano-devkit = "kernel-module-r8169 kernel-module-realtek kernel-module-rtl88x2ce"

UBOOT_EXTLINUX = "1"
KERNEL_ARGS:jetson-orin-nano-devkit = "mminit_loglevel=4 console=ttyTCU0,115200 firmware_class.path=/lib/firmware fbcon=map:0 nospectre_bhb video=efifb:off console=tty0 nvidia-drm.modeset=1 nvidia-drm.fbdev=1"

MACHINE_EXTRA_RRECOMMENDS:append:jetson-orin-nano-devkit = " nv-kernel-module-host1x kernel-module-ar0234"

KERNEL_MODULE_AUTOLOAD:append:jetson-orin-nano-devkit = " host1x tegra-drm ar0234"

MACHINE_ESSENTIAL_EXTRA_RDEPENDS:append:jetson-orin-nano-devkit = " nvidia-kernel-oot-alsa nvidia-kernel-oot-display tegra-configs-udev tegra-firmware"



KERNEL_DEVICETREE ?= "tegra234-p3768-0000+p3767-0005-nv-super-sel.dtb"